name: CI/CD Pipeline

on:
  push:
    branches:
      - develop

jobs:

  test:
    name: Run Tests + Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      #  ЛИНТИНГ
      - name: Lint (flake8)
        run: flake8 .

      # ✅ МИГРАЦИИ
      - name: Run migrations
        run: python manage.py migrate

      #  ТЕСТЫ
      - name: Run tests
        run: python manage.py test

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      #  ПРОВЕРКА СБОРКИ DOCKER
      - name: Build Docker image
        run: docker build .

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd Documentation_and_Security
            git pull
            docker compose down
            docker compose up -d --build